<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>User Registration Form</h1>

        <div id="feedback"></div>

    <form id="registration-form">
        <label for="username">Username</label>
        <input type="text" id="username" required>
<br>
        <label for="email">Email</label>
        <input type="email" id="email" required>
<br>
        <label for="number">Phone Number</label>
        <input type="tel" id="number" required>
<br>
        <label for="password">Password</label>
        <input type="password" id="password" required>
<br>
        <button type="submit">Register Form</button>
    </form>
    <button type="button" id="view-saved-data">View Saved Data</button>
    <div id="saved-data"></div>
    <button type="button" id="clear-saved-data">Clear Saved Data</button>
    

    <script src="scripts.js"></script>
</body>
</html>
